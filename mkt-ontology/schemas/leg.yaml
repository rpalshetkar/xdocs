# =============================================================================
# LEG — Instrument-specific leg detail
# =============================================================================
# Each txn has 1..N legs. Legs carry the economics — notional, rate, ccy,
# dates, product-specific fields. Fields are merged/minimized: each product
# uses a subset of the same ~25 field pool.
#
# Product mapping:
#   FX:         1 leg (spot) or 2 (swap: near+far), ccy_pair, fwd_points
#   NDF:        1 leg, ccy_pair, fixing_date, is_ndf=true
#   IRS:        2 legs (fixed+float), rate, benchmark, spread_bps, day_count
#   XCCY:       2 legs (each in diff ccy), rate, benchmark
#   FX Option:  1 leg + underlying_id, strike, exercise_style, fixing_date
#   TRS:        2 legs (return+funding), underlying_id, benchmark
#   CDS:        2 legs (protection+premium), underlying_id, spread_bps
#   Bond:       1 leg, rate (coupon), day_count, security_id
#   Bond Future:1 leg, contract, price, security_id
# =============================================================================
blueprint: schema
kind: Leg
qualifier: "ftlg-"
xid: leg_id
xns: [id, xid]
description: "Instrument-specific leg — economics, dates, product fields"
icon: git-branch

sections:
  - name: identity
    label: "Leg"
    icon: git-branch
  - name: economics
    label: "Economics"
    icon: dollar-sign
  - name: fx
    label: "FX"
    icon: repeat
  - name: dates
    label: "Dates"
    icon: calendar
  - name: option
    label: "Option"
    icon: target
  - name: delivery
    label: "Delivery & Clearing"
    icon: truck
  - name: system
    label: "System"
    icon: settings

views:
  - type: table
    label: "Leg Grid"
    icon: table
    default: true
  - type: card
    label: "Leg Cards"
    icon: layout-grid
    title: leg_id
    subtitle: leg_type

model:
  fields:
    # ── Identity ──
    leg_id: { key: true, rank: hero, grid: "3", group: identity, col: "2<", placeholder: "FTLG-001" }
    txn_id: { grid: "3", rank: primary, group: identity, ref: txns.txn_id }
    leg_type: { facet: true, grid: "3", group: identity, enum: $enums.ENUM_LEG_TYPE }
    direction: { facet: true, grid: "3", group: identity, enum: $enums.ENUM_DIRECTION }
    description: { grid: "6", group: identity }
    status: { facet: true, grid: "3", group: identity, card: badge, enum: $enums.ENUM_LEG_STATUS, default: ACTIVE }
    security_id: { grid: "3", group: identity, ref: instruments.name, description: "Instrument this leg is on" }
    underlying_id: { grid: "3", group: identity, ref: instruments.name, description: "Underlying (options, TRS, CDS)" }

    # ── Economics ──
    notional: { type: float, grid: "3", group: economics, widget: ccy }
    quantity: { type: float, grid: "3", group: economics }
    ccy: { grid: "3", group: economics, enum: $enums.ENUM_CCY }
    rate: { type: float, grid: "3", group: economics, description: "Fixed rate, coupon, repo rate, or premium rate" }
    benchmark: { grid: "3", group: economics, description: "SOFR, EURIBOR, SONIA (null if fixed)" }
    spread_bps: { type: float, grid: "3", group: economics, description: "Spread over benchmark in basis points" }
    price: { type: float, grid: "3", group: economics }
    yield_val: { type: float, grid: "3", group: economics, description: "Yield to maturity" }

    # ── FX ──
    ccy_pair: { grid: "3", group: fx, description: "EURUSD, USDJPY (null for non-FX)" }
    fwd_points: { type: float, grid: "3", group: fx }

    # ── Dates ──
    effective_date: { grid: "3", group: dates }
    maturity_date: { grid: "3", group: dates }
    fixing_date: { grid: "3", group: dates, description: "NDF fixing, rate reset, option expiry" }
    day_count: { grid: "3", group: dates, enum: $enums.ENUM_DAY_COUNT }
    frequency: { grid: "3", group: dates, description: "Coupon, fixing, or payment frequency" }

    # ── Option / Cancellable ──
    strike: { type: float, grid: "3", group: option }
    exercise_style: { grid: "3", group: option, enum: $enums.ENUM_EXERCISE_STYLE }
    call_schedule: { type: list, grid: "6", group: option, widget: tags, description: "Exercise/cancel dates" }

    # ── Delivery & Clearing ──
    is_ndf: { type: bool, grid: "3", group: delivery, default: false, description: "Non-deliverable" }
    is_cleared: { type: bool, grid: "3", group: delivery, default: false, description: "CCP cleared" }
    ccp: { grid: "3", group: delivery, description: "LCH, CME, JSCC..." }
    contract: { grid: "3", group: delivery, description: "Futures contract code (ZN, ZB, RX...)" }
