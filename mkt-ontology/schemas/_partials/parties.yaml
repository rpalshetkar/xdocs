# =============================================================================
# PARTIES — Trade counterparties with typed roles
# =============================================================================
# Usage: Embedded as parties[] list in trade events, orders, allocations.
#        Each party has a role discriminator — same entity can appear with
#        different roles (e.g., counterparty + clearing member).
# =============================================================================

blueprint: partial
description: "Trade parties with typed roles — counterparties, brokers, traders"

fields:
  parties:
    type: list
    grid: "12"
    group: parties
    description: "All parties to the trade/order with typed roles"
    items:
      type: dict
      items:
        role:           { type: str, required: true, grid: "3", enum: [PRINCIPAL, COUNTERPARTY, BROKER, EXECUTING_BROKER, CLEARING_BROKER, PRIME_BROKER, CUSTODIAN, AGENT, CCP, ADVISOR, LENDING_AGENT, TRI_PARTY_AGENT], description: "Party role in the transaction" }
        entity_id:      { type: str, grid: "3", description: "Internal entity reference" }
        entity_name:    { type: str, grid: "4", description: "Denormalized display name" }
        lei:            { type: str, grid: "4", description: "ISO 17442 Legal Entity Identifier (20-char)" }
        bic:            { type: str, grid: "3", description: "SWIFT BIC code" }
        trader:         { type: str, grid: "3", description: "Individual trader name/ID" }
        trader_short_code: { type: str, grid: "3", description: "MiFID II trader short code" }
        sales:          { type: str, grid: "3", description: "Sales coverage person" }
        desk:           { type: str, grid: "3", description: "Trading desk name/code" }
        account:        { type: str, grid: "3", description: "Account identifier at the entity" }
