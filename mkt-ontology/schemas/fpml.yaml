# =============================================================================
# FPML - ISDA FpML product templates
# =============================================================================
blueprint: schema
kind: FPML
qualifier: "ftf-"
xid: fpml_id|product_type
xns: [id, xid]
description: "ISDA FpML product template — defines leg structure and validation rules"
icon: file-text

sections:
  - name: identity
    label: "Product"
    icon: file-text
  - name: structure
    label: "Structure"
    icon: layers
  - name: system
    label: "System"
    icon: settings

views:
  - type: table
    label: "Product Catalog"
    icon: table
    default: true
  - type: card
    label: "Product Cards"
    icon: layout-grid
    title: fpml_id
    subtitle: product_type

model:
  fields:
    fpml_id: { key: true, rank: hero, grid: "4", group: identity, col: "1<", placeholder: "FPML-FX-SPOT" }
    product_type: { facet: true, grid: "4", rank: hero, group: identity, card: subtitle, enum: $enums.ENUM_PRODUCT_TYPE, col: "2<" }
    description: { grid: "4", group: identity, col: 3, placeholder: "FX Spot — T+2 delivery" }

    # Structure
    leg_types: { type: list, grid: "12", group: structure, widget: tags, description: "Required leg types for this product" }
    required_fields: { type: dict, grid: "12", group: structure, collapsed: true, description: "Fields required per leg type" }
    validation_rules: { type: list, grid: "12", group: structure, collapsed: true, description: "Product-specific validation rules" }
    template: { type: dict, grid: "12", group: structure, collapsed: true, description: "Default template values for trade capture" }
