# =============================================================================
# TXN — Product-agnostic transaction (order + trade)
# =============================================================================
# The normalized trade header. Knows WHO traded WHAT and WHEN, but not the
# economics — those live in legs. Orders and trades are the same construct,
# distinguished by txn_type. event_refs[] bridges back to the raw event chain.
# =============================================================================
blueprint: schema
kind: Txn
qualifier: "fttx-"
xid: txn_id
xns: [id, xid]
description: "Product-agnostic transaction — orders, trades, allocations, novations"
icon: swap-2

sections:
  - name: identity
    label: "Transaction"
    icon: swap-2
  - name: parties
    label: "Parties"
    icon: users
  - name: ids_section
    label: "Identifiers"
    icon: hash
  - name: lineage
    label: "Event Lineage"
    icon: git-branch
  - name: system
    label: "System"
    icon: settings

views:
  - type: table
    label: "Transaction Blotter"
    icon: table
    default: true
  - type: card
    label: "Transaction Cards"
    icon: layout-grid
    title: txn_id
    subtitle: product_type
    badge: status
  - type: kanban
    label: "By Status"
    icon: columns
    group_by: status
    title: txn_id
    subtitle: product_type
  - type: bar
    label: "By Product"
    icon: bar-chart
    x: product_type
    y: $count

model:
  fields:
    # ── Identity ──
    txn_id: { key: true, rank: hero, grid: "3", group: identity, col: "2<", placeholder: "FTTX-001" }
    txn_type: { facet: true, grid: "3", rank: primary, group: identity, enum: $enums.ENUM_TXN_TYPE }
    product_type: { facet: true, grid: "3", rank: primary, group: identity, enum: $enums.ENUM_PRODUCT_TYPE }
    trade_date: { grid: "3", group: identity }
    value_date: { grid: "3", group: identity }
    status: { facet: true, grid: "3", group: identity, card: badge, enum: $enums.ENUM_TXN_STATUS, col: 4, default: PENDING }
    source: { facet: true, grid: "3", group: identity, enum: $enums.ENUM_SOURCE_TYPE }
    venue: { facet: true, grid: "3", group: identity, enum: $enums.ENUM_VENUE }

    # ── Parties ──
    book_id: { grid: "3", group: parties, ref: books.name }
    party_id: { grid: "3", group: parties, ref: entities.name, description: "Our entity" }
    cpty_id: { grid: "3", group: parties, ref: entities.name, description: "Counterparty" }

    # ── Identifiers (golden) ──
    ids:
      type: dict
      grid: "12"
      group: ids_section
      description: "Regulatory and external trade identifiers"
      items:
        uti: { grid: "4", description: "Unique Transaction Identifier (ISO 23897)" }
        usi: { grid: "4", description: "Unique Swap Identifier (CFTC)" }
        upi: { grid: "4", description: "Unique Product Identifier (ISO 4914)" }
        xid: { grid: "4", description: "External platform reference" }

    # ── Cross-references (lean) ──
    xrefs:
      type: list
      grid: "12"
      group: ids_section
      collapsed: true
      description: "Cross-system trade references"
      items:
        type: dict
        items:
          id_type: { grid: "4", description: "UTI, USI, TRADE_ID, ORDER_ID, CLEARING_REF" }
          value: { grid: "4", description: "Identifier value" }
          source: { grid: "4", description: "OMS, MUREX, LCH, CME, DTCC..." }

    # ── Event lineage ──
    event_refs:
      type: list
      grid: "12"
      group: lineage
      collapsed: true
      description: "Links to raw event chain (RFQ → QUOTE → BOOKING → TRADE)"
      items:
        type: dict
        items:
          event_id: { grid: "3", description: "Raw event ID" }
          event_type: { grid: "3", enum: $enums.ENUM_EVENT_TYPE }
          link_type: { grid: "3", enum: $enums.ENUM_LINK_TYPE }
          chain_id: { grid: "3", description: "Correlation chain grouping" }
