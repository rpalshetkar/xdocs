# =============================================================================
# ENTITY - Legal entities, trading desks, CCPs, brokers
# =============================================================================
blueprint: schema
kind: Entity
qualifier: "fte-"
xid: entity_id|name
xns: [id, xid]
description: "Legal entity with funding, settlement, and clearing parameters"
icon: building

# Reuses shared partial schemas
includes:
  - shared/schemas/_party.yaml       # party_type (mapped to entity_type), short_name, status
  - shared/schemas/_contact.yaml     # contacts list (multiple contact persons)
  - shared/schemas/_identifiers.yaml # identifiers dict (lei, bic, duns)
  - shared/schemas/_address.yaml     # addresses list (registered + branch)

sections:
  - name: identity
    label: "Identity"
    icon: building
  - name: contact
    label: "Contacts"
    icon: phone
  - name: addresses
    label: "Addresses"
    icon: map-pin
  - name: settlement
    label: "Settlement"
    icon: repeat
  - name: hierarchy
    label: "Hierarchy"
    icon: git-branch
  - name: system
    label: "System"
    icon: settings

views:
  - type: table
    label: "Entity Directory"
    icon: table
    default: true
  - type: card
    label: "Entity Cards"
    icon: layout-grid
    title: name
    subtitle: entity_type
    badge: status
  - type: bar
    label: "By Type"
    icon: bar-chart
    x: entity_type
    y: $count

model:
  fields:
    # ── Identity (from _party) ──
    entity_id: { key: true, rank: hero, grid: "3", group: identity, col: 3, placeholder: "ENT-001" }
    entity_type: { facet: true, grid: "3", rank: hero, group: identity, enum: $enums.ENUM_ENTITY_TYPE, col: "2<", description: "Maps to _party.party_type — entity classification" }
    name: { fuzzy: true, grid: "4", rank: hero, group: identity, card: title, placeholder: "Acme Capital LLC", col: "1<", description: "From _party.party_name — full legal name" }
    short_name: { fuzzy: true, grid: "2", group: identity, placeholder: "ACME", description: "From _party.short_name — abbreviation or trading name" }
    status: { facet: true, grid: "2", group: identity, card: badge, enum: $enums.ENUM_ENTITY_STATUS, col: 4, default: ACTIVE, description: "From _party.status — lifecycle status" }

    # ── Identifiers (from _identifiers — finance subset) ──
    identifiers:
      type: dict
      grid: "12"
      group: identity
      collapsed: true
      description: "From _identifiers — regulatory identifiers (finance subset)"
      items:
        lei: { grid: "4", placeholder: "5493001KJTIIGC8Y1R12", description: "Legal Entity Identifier (ISO 17442)" }
        bic: { grid: "4", placeholder: "DEUTDEFF", description: "SWIFT BIC (ISO 9362)" }
        duns: { grid: "4", placeholder: "12-345-6789", description: "D-U-N-S Number" }

    # ── Contacts (from _contact — list pattern for multiple contact persons) ──
    contacts:
      type: list
      grid: "12"
      group: contact
      alias: "Contact Persons"
      widget: table
      description: "From _contact — multiple contact persons per entity (ops, legal, trading, settlement)"
      items:
        type: dict
        items:
          contact_type: { grid: "2", enum: [OPS, LEGAL, TRADING, SETTLEMENT, COMPLIANCE, PRIMARY], description: "Contact role" }
          name: { grid: "3", fuzzy: true, description: "Contact person name" }
          email: { grid: "3", widget: email, description: "From _contact — email" }
          phone: { grid: "2", widget: tel, description: "From _contact — phone (E.164)" }
          primary: { type: bool, grid: "2", default: false, description: "Primary contact for this role" }

    # ── Addresses (from _address — list pattern for registered + branch) ──
    addresses:
      type: list
      grid: "12"
      group: addresses
      alias: "Addresses"
      widget: table
      description: "From _address — registered office + branch addresses"
      items:
        type: dict
        items:
          address_type: { grid: "2", enum: [REGISTERED, BRANCH, MAILING, BILLING], default: REGISTERED }
          line1: { grid: "4", placeholder: "Street address" }
          line2: { grid: "3", placeholder: "Suite, floor" }
          city: { grid: "3", fuzzy: true }
          state: { grid: "3" }
          postal_code: { grid: "3", placeholder: "Postal/ZIP" }
          country: { grid: "3", widget: select, description: "ISO 3166-1 alpha-2" }

    # ── Settlement ──
    funding_ccy: { facet: true, grid: "3", group: settlement, enum: $enums.ENUM_CCY, description: "Primary funding currency" }
    settlement_ccys: { type: list, grid: "6", group: settlement, widget: tags, description: "Supported settlement currencies" }
    default_ssi_id: { grid: "3", group: settlement, placeholder: "SSI-001", description: "Standard Settlement Instructions ID" }

    # ── Hierarchy ──
    parent_entity_id: { grid: "6", group: hierarchy, ref: entities.name, description: "Parent legal entity" }
    subsidiaries: { type: list, grid: "6", group: hierarchy, widget: tags, description: "Subsidiary entity IDs" }

    # ── Extended metadata ──
    xmeta: { type: dict, grid: "12", group: settlement, collapsed: true, description: "Extended entity metadata (ratings, netting, CSA)" }
