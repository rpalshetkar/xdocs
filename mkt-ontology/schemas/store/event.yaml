# =============================================================================
# EVENT (Store) — Denormalized event record (trade + lifecycle)
# =============================================================================
# Flat, query-friendly projection of raw events. Links back to txn/leg
# for joins. Uses 9-axis pattern shared with measure and mkt for flexible
# dimensioning of event-specific data.
# =============================================================================
blueprint: schema
kind: StoreEvent
qualifier: "ftev-"
xid: event_id
xns: [id, xid]
description: "Denormalized event — flat trade and lifecycle events with axis dimensioning"
icon: zap
extends: _system.yaml
operation: MERGE

sections:
  - name: identity
    label: "Event"
    icon: zap
  - name: economics
    label: "Economics"
    icon: dollar-sign
    collapsible: true
  - name: axes
    label: "Axes"
    icon: grid
    collapsible: true
  - name: actor_section
    label: "Actor"
    icon: user
    collapsible: true
  - name: lineage
    label: "Lineage"
    icon: git-branch
    collapsible: true
    default_open: false
  - name: system
    label: "System"
    icon: settings
    collapsible: true
    default_open: false

views:
  - type: table
    label: "Event Grid"
    icon: table
    default: true
  - type: kanban
    label: "By Status"
    icon: columns
    group_by: status
    title: event_id
    subtitle: event_type
  - type: bar
    label: "By Type"
    icon: bar-chart
    x: event_type
    y: $count

model:
  fields:
    # ── Identity ──
    event_id: { type: str, required: true, key: true, rank: hero, grid: "3", group: identity, col: "2<", placeholder: "FTEV-001" }
    event_type: { type: str, required: true, facet: true, grid: "3", rank: primary, group: identity, widget: select, enum: $enums.ENUM_EVENT_TYPE }
    event_date: { type: str, grid: "3", group: identity }
    status: { type: str, facet: true, grid: "3", group: identity, card: badge, widget: select, enum: $enums.ENUM_EVENT_STATUS, default: ACTIVE }
    txn_id: { type: str, grid: "3", group: identity, widget: autocomplete, ref: store_txns.txn_id }
    leg_id: { type: str, grid: "3", group: identity, widget: autocomplete, ref: store_legs.leg_id }

    # ── Economics (denormalized) ──
    notional: { type: float, grid: "3", group: economics }
    rate: { type: float, grid: "3", group: economics }
    ccy: { type: str, grid: "3", group: economics, widget: select, enum: $enums.ENUM_CCY }
    price: { type: float, grid: "3", group: economics }
    methodology: { type: str, grid: "3", group: economics, description: "Pricing methodology" }

    # ── Numeric axes ──
    x: { type: float, grid: "3", group: axes, description: "Numeric axis 1" }
    y: { type: float, grid: "3", group: axes, description: "Numeric axis 2" }
    z: { type: float, grid: "3", group: axes, description: "Numeric axis 3" }

    # ── Text axes ──
    tx: { type: str, grid: "3", group: axes, description: "Text axis 1" }
    ty: { type: str, grid: "3", group: axes, description: "Text axis 2" }
    tz: { type: str, grid: "3", group: axes, description: "Text axis 3" }

    # ── Date axes ──
    dx: { type: str, grid: "3", group: axes, description: "Date axis 1" }
    dy: { type: str, grid: "3", group: axes, description: "Date axis 2" }
    dz: { type: str, grid: "3", group: axes, description: "Date axis 3" }

    # ── Actor ──
    actor: { type: str, grid: "3", group: actor_section }
    actor_role: { type: str, facet: true, grid: "3", group: actor_section, widget: select, enum: $enums.ENUM_ACTOR_ROLE }
    desk: { type: str, grid: "3", group: actor_section }
    source: { type: str, facet: true, grid: "3", group: actor_section, widget: select, enum: $enums.ENUM_SOURCE_TYPE }

    # ── Lineage ──
    chain_id: { type: str, grid: "4", group: lineage, description: "Correlation chain grouping" }
    link_type: { type: str, grid: "4", group: lineage, widget: select, enum: $enums.ENUM_LINK_TYPE }
    parent_event_id: { type: str, grid: "4", group: lineage, description: "Parent event in chain" }
