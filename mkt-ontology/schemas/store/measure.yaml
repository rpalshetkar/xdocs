# =============================================================================
# MEASURE — Risk metrics, P&L, valuations
# =============================================================================
# One row per metric observation. Uses 9-axis pattern for flexible
# dimensioning: x/y/z (numeric), tx/ty/tz (text), dx/dy/dz (date).
# Meaning of each axis is determined by the metric type.
#
# Examples:
#   DV01:  x=5 (sort key), tx="5Y" (tenor label), tz="SOFR_CURVE"
#   VEGA:  x=0.25 (expiry), y=105 (strike), tx="3M", ty="CALL"
#   PNL:   tx="1D" (period)
# =============================================================================
blueprint: schema
kind: Measure
qualifier: "ftms-"
xid: measure_id
xns: [id, xid]
description: "Risk/PnL metrics with flexible axis dimensioning"
icon: activity
extends: _system.yaml
operation: MERGE

sections:
  - name: identity
    label: "Measure"
    icon: activity
  - name: axes
    label: "Axes"
    icon: grid
    collapsible: true
  - name: meta
    label: "Meta"
    icon: info
    collapsible: true
  - name: system
    label: "System"
    icon: settings
    collapsible: true
    default_open: false

views:
  - type: table
    label: "Measure Grid"
    icon: table
    default: true
  - type: bar
    label: "By Metric"
    icon: bar-chart
    x: metric
    y: $count

model:
  fields:
    # ── Identity ──
    measure_id: { type: str, required: true, key: true, rank: hero, grid: "3", group: identity, col: "2<", placeholder: "FTMS-001" }
    txn_id: { type: str, grid: "3", group: identity, widget: autocomplete, ref: store_txns.txn_id }
    leg_id: { type: str, grid: "3", group: identity, widget: autocomplete, ref: store_legs.leg_id }
    metric: { type: str, required: true, facet: true, grid: "3", rank: primary, group: identity, widget: select, enum: $enums.ENUM_METRIC }
    value: { type: float, required: true, grid: "3", group: identity }
    ccy: { type: str, grid: "3", group: identity, widget: select, enum: $enums.ENUM_CCY }
    denomination: { type: str, grid: "3", group: identity, widget: select, enum: $enums.ENUM_DENOMINATION }

    # ── Numeric axes ──
    x: { type: float, grid: "3", group: axes, description: "Numeric axis 1 (tenor, expiry, sort key...)" }
    y: { type: float, grid: "3", group: axes, description: "Numeric axis 2 (strike, secondary key...)" }
    z: { type: float, grid: "3", group: axes, description: "Numeric axis 3" }

    # ── Text axes ──
    tx: { type: str, grid: "3", group: axes, description: "Text axis 1 (tenor label, curve name...)" }
    ty: { type: str, grid: "3", group: axes, description: "Text axis 2 (scenario, category...)" }
    tz: { type: str, grid: "3", group: axes, description: "Text axis 3" }

    # ── Date axes ──
    dx: { type: str, grid: "3", group: axes, description: "Date axis 1 (fixing date, valuation date...)" }
    dy: { type: str, grid: "3", group: axes, description: "Date axis 2 (effective date...)" }
    dz: { type: str, grid: "3", group: axes, description: "Date axis 3" }

    # ── Meta ──
    source: { type: str, facet: true, grid: "4", group: meta, widget: select, enum: $enums.ENUM_SOURCE_TYPE, description: "Risk engine that produced this measure" }
    as_of_date: { type: str, grid: "4", group: meta, description: "Valuation date" }
