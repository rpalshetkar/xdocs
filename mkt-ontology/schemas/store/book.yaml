# =============================================================================
# BOOK — Trading book / portfolio (cross-system)
# =============================================================================
# Golden book_id + system-specific cross-references. A book can exist
# in multiple systems (OMS, risk, P&L, settlement) with different codes.
# =============================================================================
blueprint: schema
kind: StoreBook
qualifier: "ftsb-"
xid: book_id|name
xns: [id, xid]
description: "Trading book with cross-system identifier mapping"
icon: briefcase
extends: _system.yaml
operation: MERGE

sections:
  - name: identity
    label: "Book"
    icon: briefcase
  - name: classification
    label: "Classification"
    icon: tag
    collapsible: true
  - name: xrefs_section
    label: "System References"
    icon: link
    collapsible: true
    default_open: false
  - name: system
    label: "System"
    icon: settings
    collapsible: true
    default_open: false

views:
  - type: table
    label: "Book Grid"
    icon: table
    default: true
  - type: card
    label: "Book Cards"
    icon: layout-grid
    title: name
    subtitle: desk
    badge: status
  - type: bar
    label: "By Desk"
    icon: bar-chart
    x: desk
    y: $count

model:
  fields:
    # ── Identity ──
    book_id: { type: str, required: true, key: true, rank: hero, grid: "3", group: identity, col: "2<", placeholder: "FTSB-001" }
    party_id: { type: str, required: true, grid: "3", rank: primary, group: identity, widget: autocomplete, ref: store_parties.name }
    name: { type: str, required: true, fuzzy: true, grid: "4", rank: hero, group: identity, card: title, col: "1<", placeholder: "US Rates Flow" }
    short_name: { type: str, grid: "3", group: identity }
    status: { type: str, facet: true, grid: "3", group: identity, card: badge, widget: select, enum: $enums.ENUM_BOOK_STATUS, col: 4, default: ACTIVE }
    ccy: { type: str, facet: true, grid: "3", group: identity, widget: select, enum: $enums.ENUM_CCY }

    # ── Classification ──
    desk: { type: str, facet: true, grid: "3", rank: primary, group: classification, card: subtitle }
    region: { type: str, facet: true, grid: "3", group: classification, widget: select, enum: $enums.ENUM_REGION }
    strategy: { type: str, facet: true, grid: "3", group: classification }
    book_type: { type: str, facet: true, grid: "3", group: classification, widget: select, enum: $enums.ENUM_BOOK_TYPE }
    regulatory_class: { type: str, grid: "3", group: classification, description: "FRTB classification" }

    # ── Cross-system references ──
    systems: { type: list, grid: "6", group: xrefs_section, widget: tags, description: "Systems where this book exists" }
    xrefs:
      type: list
      grid: "12"
      group: xrefs_section
      collapsed: true
      description: "System-specific book identifiers"
      items:
        type: dict
        items:
          system: { type: str, required: true, grid: "4", description: "Source system (OMS, RISK, MUREX, CALYPSO...)" }
          book_code: { type: str, required: true, grid: "4", description: "System-specific book identifier" }
          status: { type: str, grid: "3", enum: [ACTIVE, MAPPED, STALE], default: ACTIVE }
