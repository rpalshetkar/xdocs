# =============================================================================
# REGULATORY — Multi-regime regulatory reporting fields
# =============================================================================
# Each regime is its own sub-dict: emir{}, mifid{}, trace{}, sftr{}
# This keeps 400+ fields organized without polluting the top level.
# =============================================================================

blueprint: partial
description: "Regulatory reporting — EMIR, MiFID II, Dodd-Frank, TRACE, SFTR"

fields:
  regulatory:
    type: dict
    grid: "12"
    group: regulatory
    description: "Multi-regime regulatory reporting"
    items:
      # ── Universal Regulatory IDs ──
      uti:                { type: str, grid: "4", description: "Unique Transaction Identifier (ISO 23897)" }
      upi:                { type: str, grid: "4", description: "Unique Product Identifier (ISO 4914)" }
      lei_reporting:      { type: str, grid: "4", description: "LEI of reporting entity" }
      lei_counterparty:   { type: str, grid: "4", description: "LEI of counterparty" }
      status:             { type: str, grid: "3", enum: [PENDING, REPORTED, REJECTED, AMENDED, EXEMPT], description: "Reporting status" }
      jurisdictions:      { type: list, grid: "6", description: "Applicable regulatory regimes" }
      reported_at:        { type: str, grid: "3", description: "Reporting timestamp" }

      # ── EMIR / EMIR REFIT (EU/UK — 203 fields) ──
      emir:
        type: dict
        grid: "12"
        collapsed: true
        description: "EMIR reporting fields"
        items:
          action_type:          { type: str, grid: "3", enum: [NEWT, MODI, CORR, TERM, EROR, REVI, POSI, VALU, COLU, MARG], description: "Report action" }
          event_type:           { type: str, grid: "3", enum: [TRAD, NOVA, COMP, ETRM, CLRG, EXER, ALOC, CREV, PTNG], description: "Lifecycle event" }
          counterparty_side:    { type: str, grid: "3", enum: [BUYER, SELLER], description: "Side" }
          clearing_obligation:  { type: bool, grid: "2", description: "Subject to clearing mandate" }
          cleared:              { type: bool, grid: "2", description: "Actually cleared" }
          ccp_lei:              { type: str, grid: "4", description: "CCP LEI" }
          intragroup:           { type: bool, grid: "2", description: "Intragroup trade" }
          venue_mic:            { type: str, grid: "3", description: "Execution venue MIC" }
          trading_capacity:     { type: str, grid: "3", enum: [PRINCIPAL, AGENT], description: "Trading capacity" }
          # Valuation
          valuation_amount:     { type: float, grid: "3", description: "MTM value" }
          valuation_ccy:        { type: str, grid: "2", description: "Valuation currency" }
          valuation_timestamp:  { type: str, grid: "3", description: "Valuation date/time" }
          valuation_type:       { type: str, grid: "3", enum: [MTM, MODEL, CCP], description: "Valuation method" }
          # Margin
          im_posted:            { type: float, grid: "3", description: "Initial margin posted" }
          im_received:          { type: float, grid: "3", description: "Initial margin received" }
          vm_posted:            { type: float, grid: "3", description: "Variation margin posted" }
          vm_received:          { type: float, grid: "3", description: "Variation margin received" }
          collateral_portfolio: { type: str, grid: "3", description: "Collateral portfolio code" }

      # ── MiFID II / MiFIR (RTS 22 — 65 fields) ──
      mifid:
        type: dict
        grid: "12"
        collapsed: true
        description: "MiFID II transaction reporting"
        items:
          transaction_ref:      { type: str, grid: "4", description: "Transaction reference number" }
          instrument_id:        { type: str, grid: "4", description: "ISIN" }
          venue:                { type: str, grid: "3", enum: $enums.ENUM_MIFID_VENUE, description: "MIC / XOFF / SI" }
          exec_decision:        { type: str, grid: "3", description: "Execution decision maker (person/algo)" }
          investment_decision:  { type: str, grid: "3", description: "Investment decision maker" }
          trading_capacity:     { type: str, grid: "3", enum: [DEAL, MTCH, AOTC], description: "Trading capacity" }
          short_selling:        { type: str, grid: "3", enum: [SESH, SSEX, SELL, UNDI], description: "Short sale indicator" }
          waiver:               { type: str, grid: "3", description: "Pre-trade waiver type" }
          post_trade_flag:      { type: str, grid: "3", description: "Post-trade indicator (LRGS, ILQD, SIZE)" }
          commodity_derivative: { type: bool, grid: "2", description: "Commodity derivative flag" }

      # ── Dodd-Frank (CFTC) ──
      dodd_frank:
        type: dict
        grid: "12"
        collapsed: true
        description: "CFTC swap reporting"
        items:
          usi:                  { type: str, grid: "4", description: "Unique Swap Identifier" }
          sef_execution:        { type: bool, grid: "2", description: "Executed on SEF" }
          sef_name:             { type: str, grid: "3", description: "SEF venue name" }
          dco:                  { type: str, grid: "3", description: "DCO/CCP" }
          sdr:                  { type: str, grid: "3", description: "Swap Data Repository" }
          block_trade:          { type: bool, grid: "2", description: "Block trade exception" }
          reporting_side:       { type: str, grid: "3", enum: [BUY, SELL], description: "Reporting party side" }
          end_user_exception:   { type: bool, grid: "2", description: "End-user clearing exception" }

      # ── TRACE (FINRA — US bonds) ──
      trace:
        type: dict
        grid: "12"
        collapsed: true
        description: "FINRA TRACE reporting"
        items:
          report_id:            { type: str, grid: "4", description: "TRACE control number" }
          execution_time:       { type: str, grid: "3", description: "Execution time" }
          dissemination_time:   { type: str, grid: "3", description: "Public dissemination time" }
          contra_party_type:    { type: str, grid: "3", enum: [CUSTOMER, DEALER, AFFILIATE, ATS], description: "Contra party type" }
          capacity:             { type: str, grid: "3", enum: [PRINCIPAL, AGENT, RISKLESS], description: "Broker capacity" }
          ats_indicator:        { type: bool, grid: "2", description: "Executed on ATS" }
          special_price:        { type: bool, grid: "2", description: "Special price condition" }
          as_of_indicator:      { type: str, grid: "3", enum: [SAME_DAY, AS_OF, REVERSAL], description: "Reporting timing" }

      # ── SFTR (Securities Financing — 155 fields, 4 tables) ──
      sftr:
        type: dict
        grid: "12"
        collapsed: true
        description: "SFTR reporting"
        items:
          sft_type:             { type: str, grid: "3", enum: [REPO, REVERSE_REPO, BSB_SBB, MARGIN_LENDING, SL_SB], description: "SFT type" }
          action_type:          { type: str, grid: "3", enum: [NEWT, MODI, VALU, COLU, ETRM, EROR, CORR, POSI], description: "Report action" }
          master_agreement:     { type: str, grid: "3", enum: [GMRA, GMSLA, MRA, ISDA_MASTER], description: "Master agreement type" }
          repo_rate:            { type: float, grid: "3", description: "Repo rate" }
          lending_fee_bps:      { type: float, grid: "3", description: "Securities lending fee (bps)" }
          haircut_pct:          { type: float, grid: "3", description: "Collateral haircut %" }
          collateral_type:      { type: str, grid: "3", enum: [CASH, SECURITIES, MIXED], description: "Collateral type" }
          reuse_indicator:      { type: bool, grid: "2", description: "Collateral reuse flag" }
