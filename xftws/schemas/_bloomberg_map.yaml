# =============================================================================
# BLOOMBERG MAP — Mnemonic → Canonical Field Path
# =============================================================================
# Single source of truth for ingest pipeline normalization.
# Format: bbg_mnemonic: canonical.path.to.field
#
# Each entry maps a Bloomberg field mnemonic to its location in the
# normalized data dictionary. The ingest pipeline reads this to transform
# Bloomberg data into canonical XDS documents.
# =============================================================================

description: "Bloomberg mnemonic → canonical field path mapping"

