# =============================================================================
# BOOK - Trading books / portfolios within entities
# =============================================================================
blueprint: schema
kind: Book
qualifier: "ftb-"
xid: book_id|name
xns: [id, xid]
description: "Trading book / portfolio with desk, region, and risk limits"
icon: briefcase
extends: _system.yaml
operation: MERGE

sections:
  - name: identity
    label: "Book"
    icon: briefcase
  - name: limits
    label: "Limits"
    icon: shield
    collapsible: true
    roles: [operations, risk, admin]
  - name: system
    label: "System"
    icon: settings
    collapsible: true
    default_open: false

views:
  - type: table
    label: "Book Grid"
    icon: table
    default: true
  - type: card
    label: "Book Cards"
    icon: layout-grid
    title: name
    subtitle: desk
    badge: status
  - type: bar
    label: "By Region"
    icon: bar-chart
    x: region
    y: $count
  - type: bar
    label: "By Desk"
    icon: bar-chart
    x: desk
    y: $count

model:
  fields:
    book_id: { type: str, required: true, key: true, rank: hero, grid: "3", group: identity, col: "2<", placeholder: "BK-001" }
    entity_id: { type: str, required: true, grid: "3", rank: primary, group: identity, widget: autocomplete, ref: entities.name }
    name: { type: str, required: true, fuzzy: true, grid: "4", rank: hero, group: identity, card: title, col: "1<", placeholder: "FX Spot Book" }
    desk: { type: str, facet: true, grid: "3", rank: primary, group: identity, card: subtitle, col: 3, placeholder: "FX Trading" }
    region: { type: str, facet: true, grid: "3", group: identity, widget: select, enum: $enums.ENUM_REGION }
    strategy: { type: str, facet: true, grid: "3", group: identity, placeholder: "Market Making" }
    status: { type: str, facet: true, grid: "3", group: identity, card: badge, widget: select, enum: $enums.ENUM_BOOK_STATUS, col: 4, default: ACTIVE }

    # Limits
    ccy: { type: str, facet: true, grid: "4", group: limits, widget: select, enum: $enums.ENUM_CCY }
    risk_limit: { type: float, grid: "4", group: limits, widget: ccy, description: "Maximum risk exposure (in book ccy)" }
